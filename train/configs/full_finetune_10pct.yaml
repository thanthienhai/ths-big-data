experiment:
  name: qwen3_4b_full_finetune_10pct
  seed: 42
  output_root: train/outputs
  smoke_test: false
  require_cuda: true
  min_free_disk_gb: 30

dataset:
  id: YuITC/Vietnamese-Legal-Documents
  name: null
  split: train
  sample_fraction: 0.10
  split_ratios:
    train: 0.80
    validation: 0.10
    test: 0.10
  max_records: null
  schema:
    question:
      - question
      - query
      - cau_hoi
      - instruction
    context:
      - context
      - legal_context
      - context_list
      - text
      - document
    answer:
      - answer
      - response
      - output
      - target
    source:
      - source
      - document_id
      - doc_id
      - law_id
      - title
  instruction: "Trả lời câu hỏi pháp luật Việt Nam dựa trên ngữ cảnh được cung cấp. Nếu không đủ căn cứ, hãy nói rõ không đủ thông tin."

model:
  base_model_id: Qwen/Qwen3-4B-Instruct-2507
  trust_remote_code: true
  dtype: auto
  gradient_checkpointing: true
  checkpoint_dir_name: qwen3_4b_full_finetuned

training:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.000005
  weight_decay: 0.01
  warmup_ratio: 0.03
  logging_steps: 5
  save_strategy: epoch
  eval_strategy: epoch
  max_seq_length: 2048
  max_steps: -1
  fp16: false
  bf16: true

generation:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  do_sample: false

evaluation:
  max_eval_samples: null
  metrics:
    - exact_match
    - token_f1
    - rouge_l
    - bert_score
  run_baselines: true
  rerun_only: false

baselines:
  required:
    - name: qwen3_original
      model_id: Qwen/Qwen3-4B-Instruct-2507
      required: true
  optional:
    - name: qwen2_5_3b_instruct
      model_id: Qwen/Qwen2.5-3B-Instruct
      required: false
    - name: phi_3_5_mini
      model_id: microsoft/Phi-3.5-mini-instruct
      required: false

