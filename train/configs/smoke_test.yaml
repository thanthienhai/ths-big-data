experiment:
  name: smoke_full_finetune_pipeline
  seed: 7
  output_root: train/outputs
  smoke_test: true
  require_cuda: false
  min_free_disk_gb: 1

dataset:
  id: synthetic-vietnamese-legal-smoke
  name: null
  split: train
  sample_fraction: 0.10
  split_ratios:
    train: 0.60
    validation: 0.20
    test: 0.20
  max_records: 10
  schema:
    question: [question]
    context: [legal_context]
    answer: [answer]
    source: [source]
  instruction: "Trả lời câu hỏi pháp luật Việt Nam dựa trên ngữ cảnh được cung cấp."

model:
  base_model_id: smoke/mock-causal-lm
  trust_remote_code: false
  dtype: auto
  gradient_checkpointing: false
  checkpoint_dir_name: smoke_full_finetuned

training:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.00001
  weight_decay: 0.0
  warmup_ratio: 0.0
  logging_steps: 1
  save_strategy: "no"
  eval_strategy: "no"
  max_seq_length: 512
  max_steps: 1
  fp16: false
  bf16: false

generation:
  max_new_tokens: 64
  temperature: 0.0
  top_p: 1.0
  do_sample: false

evaluation:
  max_eval_samples: 4
  metrics:
    - exact_match
    - token_f1
    - rouge_l
    - bert_score
  run_baselines: true
  rerun_only: false

baselines:
  required:
    - name: qwen3_original
      model_id: smoke/mock-baseline
      required: true
  optional:
    - name: optional_mock
      model_id: smoke/mock-optional
      required: false

